{% extends 'auth_base.html' %}

{% block content %}
  <div class="auth-form-card">
    <p class="eyebrow mb-2">Create Account</p>
    <h1 class="auth-form-title">Buat akun baru.</h1>
    <p class="auth-form-copy">Daftarkan akun untuk mulai memakai template dashboard yang baru.</p>

    <form method="POST" action="{{ url_for('register') }}" class="row g-3 mt-1">
      <div class="col-12">
        <label class="form-label" for="email">Email</label>
        <input class="form-control form-control-lg" type="email" id="email" name="email" placeholder="nama@email.com" required>
      </div>
      <div class="col-12">
        <label class="form-label" for="username">Username</label>
        <input class="form-control form-control-lg" type="text" id="username" name="username" placeholder="Buat username" required>
      </div>
      <div class="col-12">
        <label class="form-label" for="password">Password</label>
        <input class="form-control form-control-lg" type="password" id="password" name="password" placeholder="Buat password" required>
      </div>
      <div class="col-12 d-grid">
        <button class="btn btn-primary btn-lg" type="submit">Create Account</button>
      </div>
    </form>

    <p class="auth-switch mb-0">
      Sudah punya akun?
      <a href="{{ url_for('login') }}">Login di sini</a>
    </p>
  </div>
{% endblock %}
