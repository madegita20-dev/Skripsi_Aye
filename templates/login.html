{% extends 'auth_base.html' %}

{% block content %}
  <div class="auth-form-card">
    <p class="eyebrow mb-2">Sign In</p>
    <h1 class="auth-form-title">Masuk ke dashboard.</h1>
    <p class="auth-form-copy">Gunakan akun yang sudah terdaftar untuk mengakses modul klasifikasi.</p>

    <form method="POST" action="{{ url_for('login') }}" class="row g-3 mt-1">
      <div class="col-12">
        <label class="form-label" for="username">Username</label>
        <input class="form-control form-control-lg" type="text" id="username" name="username" placeholder="Masukkan username" required>
      </div>
      <div class="col-12">
        <label class="form-label" for="password">Password</label>
        <input class="form-control form-control-lg" type="password" id="password" name="password" placeholder="Masukkan password" required>
      </div>
      <div class="col-12 d-grid">
        <button class="btn btn-primary btn-lg" type="submit">Sign In</button>
      </div>
    </form>

    <p class="auth-switch mb-0">
      Belum punya akun?
      <a href="{{ url_for('register') }}">Daftar sekarang</a>
    </p>
  </div>
{% endblock %}
